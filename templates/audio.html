{% extends 'base.html' %}

{% block title %}Convertisseur - Audio{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <p class="text-muted mb-3">Conversion audio MP4 → MP3 et MP3 → WAV.</p>
    <form action="{{ url_for('convert.convert') }}" method="post" enctype="multipart/form-data">
      <input type="hidden" name="conversion_type" value="audio" />
      <div class="mb-3">
        <small class="text-muted d-block mb-2">Presets rapides:</small>
        <div class="btn-group d-flex gap-2 mb-3 flex-wrap">
          <button type="button" class="btn btn-sm btn-outline-primary preset-audio" data-target="mp3">MP4 → MP3</button>
          <button type="button" class="btn btn-sm btn-outline-primary preset-audio" data-target="wav">MP3 → WAV</button>
        </div>
      </div>
      <div class="mb-3">
        <label for="file" class="form-label">Fichier(s)</label>
        <input class="form-control" type="file" id="file" name="file" multiple required accept=".mp4,.mp3" data-preview-target="file_preview" />
        <div class="form-text">En lot, un ZIP est généré automatiquement.</div>
      </div>
      <div id="file_preview" class="file-preview mt-3" style="display: none;">
        <div class="card bg-light border-0">
          <div class="card-body">
            <small class="text-muted d-block mb-2">Previsualisation</small>
            <div class="file-preview-body"></div>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label for="target_format" class="form-label">Format de sortie</label>
        <select class="form-select" id="target_format" name="target_format" required>
          <option value="mp3">MP3</option>
          <option value="wav">WAV</option>
        </select>
      </div>
      <button class="btn btn-primary" type="submit">Convertir et télécharger</button>
    </form>
    <script>
    // Pré-remplir depuis le preset rapide (depuis sessionStorage)
    const selectedFormat = sessionStorage.getItem('selectedFormat');
    if (selectedFormat) {
      const select = document.getElementById('target_format');
      if (select && Array.from(select.options).some(o => o.value === selectedFormat)) {
        select.value = selectedFormat;
        sessionStorage.removeItem('selectedFormat');
      }
    }

    document.querySelectorAll('.preset-audio').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const target = this.dataset.target;
        document.getElementById('target_format').value = target;
      });
    });
    </script>
  </div>
</div>

{% include '_jobs_table.html' %}
{% endblock %}

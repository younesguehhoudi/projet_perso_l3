{% extends 'base.html' %}

{% block title %}Convertisseur - Documents{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <p class="text-muted mb-3">Conversion documents PDF/DOCX/TXT.</p>
    <form action="{{ url_for('convert') }}" method="post" enctype="multipart/form-data">
      <input type="hidden" name="conversion_type" value="document" />
      <div class="mb-3">
        <label for="file" class="form-label">Fichier(s)</label>
        <input class="form-control" type="file" id="file" name="file" multiple required accept=".pdf,.docx,.txt" />
        <div class="form-text">En lot, un ZIP est généré automatiquement.</div>
      </div>
      <div class="mb-3">
        <label for="target_format" class="form-label">Format de sortie</label>
        <select class="form-select" id="target_format" name="target_format" required>
          <option value="pdf">PDF</option>
          <option value="docx">DOCX</option>
          <option value="txt">TXT</option>
        </select>
      </div>
      <div class="mb-3" id="txt_encoding_group" style="display: none;">
        <label for="txt_encoding" class="form-label">Encodage TXT</label>
        <select class="form-select" id="txt_encoding" name="txt_encoding">
          <option value="utf-8" selected>UTF-8</option>
          <option value="latin-1">Latin-1</option>
        </select>
      </div>
      <button class="btn btn-primary" type="submit">Convertir et télécharger</button>
    </form>
  </div>
</div>

{% include '_jobs_table.html' %}
{% endblock %}

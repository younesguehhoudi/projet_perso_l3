{% extends 'base.html' %}

{% block title %}Convertisseur - Images{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <p class="text-muted mb-3">Conversion d’images PNG/JPG/WebP et SVG → PNG.</p>
    <form action="{{ url_for('convert') }}" method="post" enctype="multipart/form-data">
      <input type="hidden" name="conversion_type" value="image" />
      <div class="mb-3">
        <label for="file" class="form-label">Fichier(s)</label>
        <input class="form-control" type="file" id="file" name="file" multiple required accept=".png,.jpg,.jpeg,.webp,.svg" />
        <div class="form-text">En lot, un ZIP est généré automatiquement.</div>
      </div>
      <div class="mb-3">
        <label for="target_format" class="form-label">Format de sortie</label>
        <select class="form-select" id="target_format" name="target_format" required>
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
      <button class="btn btn-primary" type="submit">Convertir et télécharger</button>
    </form>
  </div>
</div>

{% include '_jobs_table.html' %}
{% endblock %}
